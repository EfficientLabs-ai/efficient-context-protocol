name: ECP CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run preflight
      - run: npm test
      - run: npm run bench
      - run: npm run audit
